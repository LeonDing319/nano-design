<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>开关灯音效 · 10 种</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e5e5e5;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:40px}
h1{font-size:12px;color:#3a3a3a;letter-spacing:.18em;text-transform:uppercase}
.sub{font-size:11px;color:#2a2a2a;text-align:center;line-height:1.9;max-width:440px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:500px}
.btn{background:#111;border:1px solid #1c1c1c;border-radius:10px;padding:16px 14px;cursor:pointer;transition:all .1s;text-align:left;display:flex;flex-direction:column;gap:5px;width:100%}
.btn:hover{background:#171717;border-color:#272727}
.btn:active{transform:scale(.96)}
.btn.playing{border-color:#fbbf24;background:#1a1500}
.btn.selected{border-color:#34d399;background:#091410}
.num{font-size:10px;color:#2a2a2a}
.name{font-size:13px;color:#c0c0c0;font-weight:600}
.desc{font-size:11px;color:#3a3a3a;line-height:1.5}
.status{font-size:11px;color:#34d399;text-align:center;height:16px}
.foot{font-size:10px;color:#222;text-align:center}
</style>
</head>
<body>
<h1>开关灯音效 · 10 种</h1>
<p class="sub">点击试听，告诉我喜欢哪个编号</p>

<div class="grid">
  <button class="btn" onclick="play(this,1,'sw1')"><span class="num">01</span><span class="name">老式拨动开关</span><span class="desc">咔哒一声，干脆利落</span></button>
  <button class="btn" onclick="play(this,2,'sw2')"><span class="num">02</span><span class="name">按压开关</span><span class="desc">轻按弹起，回弹感</span></button>
  <button class="btn" onclick="play(this,3,'sw3')"><span class="num">03</span><span class="name">荧光灯启动</span><span class="desc">轻微嗡嗡，然后亮起</span></button>
  <button class="btn" onclick="play(this,4,'sw4')"><span class="num">04</span><span class="name">触摸感应灯</span><span class="desc">轻柔电子音，科技感</span></button>
  <button class="btn" onclick="play(this,5,'sw5')"><span class="num">05</span><span class="name">台灯拉绳</span><span class="desc">绳子一拉，咔哒</span></span></button>
  <button class="btn" onclick="play(this,6,'sw6')"><span class="num">06</span><span class="name">魔法点灯</span><span class="desc">神奇闪光，星尘感</span></button>
  <button class="btn" onclick="play(this,7,'sw7')"><span class="num">07</span><span class="name">蜡烛点燃</span><span class="desc">轻柔温暖，慢慢亮起</span></button>
  <button class="btn" onclick="play(this,8,'sw8')"><span class="num">08</span><span class="name">霓虹灯</span><span class="desc">电流嗡嗡，赛博感</span></button>
  <button class="btn" onclick="play(this,9,'sw9')"><span class="num">09</span><span class="name">宇宙能量</span><span class="desc">低频升起，充能感</span></button>
  <button class="btn" onclick="play(this,10,'sw10')"><span class="num">10</span><span class="name">水晶球</span><span class="desc">空灵共鸣，治愈感</span></button>
</div>

<p class="status" id="st"></p>
<p class="foot">告诉我你喜欢的编号，我替换进主题切换按钮</p>

<script>
let ctx=null;
function gc(){if(!ctx)ctx=new AudioContext();if(ctx.state==='suspended')ctx.resume();return ctx;}

function play(btn,num,type){
  document.querySelectorAll('.btn.selected').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected','playing');
  setTimeout(()=>btn.classList.remove('playing'),300);
  document.getElementById('st').textContent='▶ '+btn.querySelector('.name').textContent;
  const c=gc(),t=c.currentTime;

  switch(type){
    // 01 老式拨动开关 — 两段咔哒
    case'sw1':{
      [0, .04].forEach((d,i)=>{
        const buf=c.createBuffer(1,~~(c.sampleRate*.007),c.sampleRate);
        const data=buf.getChannelData(0);
        for(let j=0;j<data.length;j++) data[j]=(Math.random()*2-1)*Math.pow(1-j/data.length, i===0?8:12);
        const s=c.createBufferSource();s.buffer=buf;
        const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=i===0?2500:3500;f.Q.value=1.5;
        const g=c.createGain();g.gain.value=i===0?.5:.35;
        s.connect(f);f.connect(g);g.connect(c.destination);s.start(t+d);
      });break;
    }
    // 02 按压开关 — 下压+弹起
    case'sw2':{
      const o=c.createOscillator();o.type='square';
      o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(180,t+.03);
      const g=c.createGain();
      g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);
      o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.07);
      // 弹起
      setTimeout(()=>{
        const o2=c.createOscillator();o2.type='square';
        o2.frequency.setValueAtTime(250,t+.1);o2.frequency.exponentialRampToValueAtTime(400,t+.13);
        const g2=c.createGain();
        g2.gain.setValueAtTime(.18,t+.1);g2.gain.exponentialRampToValueAtTime(.001,t+.16);
        o2.connect(g2);g2.connect(c.destination);o2.start(t+.1);o2.stop(t+.17);
      },80);break;
    }
    // 03 荧光灯启动 — 嗡嗡声+闪烁+稳定
    case'sw3':{
      const o=c.createOscillator();o.type='sawtooth';o.frequency.value=120;
      const lfo=c.createOscillator();const lfoG=c.createGain();
      lfo.type='square';lfo.frequency.value=18;lfoG.gain.value=.06;
      lfo.connect(lfoG);lfoG.connect((()=>{const g=c.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.12,t+.05);g.gain.linearRampToValueAtTime(.05,t+.15);g.gain.linearRampToValueAtTime(.12,t+.2);g.gain.linearRampToValueAtTime(.1,t+.35);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.connect(g);g.connect(c.destination);o.start(t);lfo.start(t);o.stop(t+.55);lfo.stop(t+.55);return g;})().gain);break;
    }
    // 04 触摸感应灯 — 柔和上扬电子音
    case'sw4':{
      const o=c.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(1200,t+.08);
      const g=c.createGain();
      g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(.2,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.12);
      o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.15);
      // 泛音
      const o2=c.createOscillator();o2.type='sine';o2.frequency.value=1800;
      const g2=c.createGain();
      g2.gain.setValueAtTime(.001,t+.03);g2.gain.linearRampToValueAtTime(.08,t+.06);g2.gain.exponentialRampToValueAtTime(.001,t+.18);
      o2.connect(g2);g2.connect(c.destination);o2.start(t+.03);o2.stop(t+.2);break;
    }
    // 05 台灯拉绳 — 绳子拉动+咔哒
    case'sw5':{
      // 绳子声（短暂摩擦）
      const buf=c.createBuffer(1,~~(c.sampleRate*.025),c.sampleRate);
      const data=buf.getChannelData(0);
      for(let j=0;j<data.length;j++) data[j]=(Math.random()*2-1)*.3*Math.pow(1-j/data.length,1.5);
      const s=c.createBufferSource();s.buffer=buf;
      const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=1500;f.Q.value=.8;
      const g=c.createGain();g.gain.value=.5;
      s.connect(f);f.connect(g);g.connect(c.destination);s.start(t);
      // 咔哒
      const buf2=c.createBuffer(1,~~(c.sampleRate*.006),c.sampleRate);
      const data2=buf2.getChannelData(0);
      for(let j=0;j<data2.length;j++) data2[j]=(Math.random()*2-1)*Math.pow(1-j/data2.length,10);
      const s2=c.createBufferSource();s2.buffer=buf2;
      const f2=c.createBiquadFilter();f2.type='bandpass';f2.frequency.value=4000;f2.Q.value=2;
      const g2=c.createGain();g2.gain.value=.6;
      s2.connect(f2);f2.connect(g2);g2.connect(c.destination);s2.start(t+.028);break;
    }
    // 06 魔法点灯 — 星尘上升
    case'sw6':{
      [0,.02,.04,.06,.08].forEach((d,i)=>{
        const o=c.createOscillator();o.type='sine';
        o.frequency.value=800+i*250;
        const g=c.createGain();
        g.gain.setValueAtTime(.001,t+d);g.gain.linearRampToValueAtTime(.15,t+d+.008);g.gain.exponentialRampToValueAtTime(.001,t+d+.1);
        o.connect(g);g.connect(c.destination);o.start(t+d);o.stop(t+d+.12);
      });break;
    }
    // 07 蜡烛点燃 — 温暖慢亮
    case'sw7':{
      const o=c.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(180,t);o.frequency.linearRampToValueAtTime(220,t+.2);
      const lfo=c.createOscillator();const lfoG=c.createGain();
      lfo.frequency.value=5;lfoG.gain.value=8;
      lfo.connect(lfoG);lfoG.connect(o.frequency);
      const g=c.createGain();
      g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(.18,t+.08);g.gain.exponentialRampToValueAtTime(.001,t+.35);
      o.connect(g);g.connect(c.destination);o.start(t);lfo.start(t);o.stop(t+.4);lfo.stop(t+.4);break;
    }
    // 08 霓虹灯 — 电流嗡+嗞嗞
    case'sw8':{
      const o=c.createOscillator();o.type='sawtooth';o.frequency.value=240;
      const buf=c.createBuffer(1,~~(c.sampleRate*.08),c.sampleRate);
      const data=buf.getChannelData(0);
      for(let j=0;j<data.length;j++) data[j]=(Math.random()*2-1)*.15;
      const s=c.createBufferSource();s.buffer=buf;
      const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=3000;f.Q.value=1;
      const gOsc=c.createGain();gOsc.gain.setValueAtTime(.15,t);gOsc.gain.exponentialRampToValueAtTime(.001,t+.12);
      const gNoise=c.createGain();gNoise.gain.value=.3;
      o.connect(gOsc);gOsc.connect(c.destination);
      s.connect(f);f.connect(gNoise);gNoise.connect(c.destination);
      o.start(t);o.stop(t+.13);s.start(t);break;
    }
    // 09 宇宙能量 — 低频升起
    case'sw9':{
      const o=c.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(60,t);o.frequency.exponentialRampToValueAtTime(180,t+.25);
      const o2=c.createOscillator();o2.type='sine';
      o2.frequency.setValueAtTime(90,t);o2.frequency.exponentialRampToValueAtTime(270,t+.25);
      const g=c.createGain();
      g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(.3,t+.1);g.gain.exponentialRampToValueAtTime(.001,t+.35);
      o.connect(g);o2.connect(g);g.connect(c.destination);
      o.start(t);o2.start(t);o.stop(t+.38);o2.stop(t+.38);break;
    }
    // 10 水晶球 — 空灵共鸣
    case'sw10':{
      [1046,1318,1568,2093].forEach((freq,i)=>{
        const o=c.createOscillator();o.type='sine';o.frequency.value=freq;
        const g=c.createGain();
        g.gain.setValueAtTime(.001,t+i*.03);
        g.gain.linearRampToValueAtTime(.14,t+i*.03+.01);
        g.gain.exponentialRampToValueAtTime(.001,t+i*.03+.3);
        o.connect(g);g.connect(c.destination);o.start(t+i*.03);o.stop(t+i*.03+.35);
      });break;
    }
  }
}
</script>
</body>
</html>
